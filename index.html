<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIRA — Civic Pollution Intelligence Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 1. LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="14" stroke="#00d4ff" stroke-width="2" />
        <path d="M10 16 Q13 10 16 16 Q19 22 22 16" stroke="#00d4ff" stroke-width="2" fill="none"
          stroke-linecap="round" />
        <circle cx="16" cy="16" r="3" fill="#00d4ff" />
      </svg>
      <span class="brand-text">AIRA</span>
    </div>

    <nav class="sidebar-nav">
      <!-- Active dashboard icon -->
      <a href="#" class="nav-item active">
        <div class="nav-indicator"></div>
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
          <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
          <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
          <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
        </svg>
      </a>
      <!-- Map icon -->
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 3L3 6v15l6-3 6 3 6-3V3l-6 3-6-3z" stroke="currentColor" stroke-width="1.8"
            stroke-linejoin="round" />
          <line x1="9" y1="3" x2="9" y2="18" stroke="currentColor" stroke-width="1.8" />
          <line x1="15" y1="6" x2="15" y2="21" stroke="currentColor" stroke-width="1.8" />
        </svg>
      </a>
      <!-- Alerts icon with badge -->
      <a href="#" class="nav-item has-badge">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
        <span class="badge">4</span>
      </a>
      <!-- Docs icon -->
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor"
            stroke-width="1.8" />
          <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
          <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" stroke-width="1.8" />
          <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" stroke-width="1.8" />
        </svg>
      </a>
      <!-- User profile -->
      <a href="#" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8" />
          <path d="M20 21a8 8 0 1 0-16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </a>
    </nav>
    <div class="sidebar-status">
      <div class="status-dot online"></div>
      <span>Online</span>
    </div>
  </aside>

  <!-- 2. MAIN CONTENT SPLIT LAYOUT -->
  <main class="main-content">

    <!-- LEFT COLUMN: CARDS -->
    <section class="data-col">

      <!-- FORECAST CARD (LIGHT) -->
      <div class="card forecast-card">
        <div class="fc-header">
          <div class="fc-location-info">
            <div class="fc-location" id="fc-location-name">DELHI NCR <svg viewBox="0 0 24 24" class="icon-sm"
                fill="none">
                <path d="M12 2L2 22l10-4 10 4L12 2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
              </svg></div>
            <div class="fc-status" id="fc-status">High</div>
            <div class="fc-time" id="fc-time">Jul 16 12:00 PM, local time</div>
          </div>
          <div class="fc-aqi-circle">
            <svg viewBox="0 0 64 64" class="ring-svg">
              <circle cx="32" cy="32" r="28" fill="none" stroke="#f1f5f9" stroke-width="4"></circle>
              <circle cx="32" cy="32" r="28" fill="none" stroke="#ff9800" stroke-width="4" stroke-dasharray="175.9"
                stroke-dashoffset="87.95" id="fc-ring-progress" style="transition: stroke-dashoffset 1s ease-in-out;">
              </circle>
              <circle cx="60" cy="32" r="3" fill="#ff9800" id="fc-ring-dot"
                style="transition: transform 1s ease-in-out; transform-origin: 32px 32px; transform: rotate(180deg);">
              </circle>
            </svg>
            <div class="circle-content">
              <div class="circle-val" id="fc-aqi-val">247</div>
              <div class="circle-lbl">AQI</div>
            </div>
          </div>
        </div>
        <div class="fc-chart-container">
          <canvas id="forecastChart"></canvas>
        </div>
        <div class="fc-footer">
          <div class="fcf-left">
            <div class="fcf-title">FORECAST</div>
            <div class="fcf-subtitle">Daily Average</div>
          </div>
          <div class="fcf-dots">
            <div class="dot good"></div>
            <div class="dot moderate"></div>
            <div class="dot good"></div>
          </div>
        </div>
      </div>

      <!-- AQI DETAILS CARD (DARK) -->
      <div class="card aqi-card">
        <div class="aqi-pulse-ring" id="aqi-pulse-ring"></div>

        <div class="aqi-header">
          <div class="aqi-label-row">
            <span class="aqi-label">Air Quality Index</span>
            <div class="confidence-badge">
              <div class="conf-dot"></div>
              <span>98.4% confidence</span>
            </div>
          </div>
          <div class="aqi-location" id="aqi-card-location">📍 Delhi NCR — All Wards</div>
        </div>

        <div class="aqi-main">
          <div class="aqi-number-wrap">
            <div class="aqi-number" id="aqi-card-val">247</div>
            <div class="aqi-trend up" id="aqi-card-trend">▲ +12</div>
          </div>
          <div class="aqi-risk">
            <div class="risk-label" id="aqi-card-risk">Very Unhealthy</div>
            <div class="risk-bar">
              <div class="risk-fill" id="aqi-card-risk-fill" style="width: 82.3333%;"></div>
            </div>
          </div>
        </div>

        <div class="embedded-bubble-cluster">
          <div class="pollutant-bubble pm25" id="bubble-pm25">
            <span class="b-value">187</span>
            <span class="b-label">PM2.5</span>
            <span class="b-unit">µg/m³</span>
          </div>
          <div class="pollutant-bubble pm10" id="bubble-pm10">
            <span class="b-value">244</span>
            <span class="b-label">PM10</span>
            <span class="b-unit">µg/m³</span>
          </div>
          <div class="pollutant-bubble no2" id="bubble-no2">
            <span class="b-value">81</span>
            <span class="b-label">NO₂</span>
            <span class="b-unit">ppb</span>
          </div>
        </div>

        <div class="aqi-footer">
          <div class="pollutant-pill">
            <span class="pill-label">Dominant</span>
            <span class="pill-val" id="aqi-card-dominant">PM2.5</span>
          </div>
          <div class="pollutant-pill">
            <span class="pill-label">Temperature</span>
            <span class="pill-val">23°C</span>
          </div>
        </div>
      </div>

    </section>

    <!-- RIGHT COLUMN: MAP -->
    <section class="map-col">
      <div id="map" class="map-container"></div>

      <!-- Absolute positioned overlays inside map -->
      <button class="map-view-toggle glass-btn" id="heatmap-toggle" onclick="toggleHeatmap()">
        <span id="heatmap-toggle-lbl">🗺️ Ward View</span>
      </button>

      <div class="map-zoom-controls">
        <button class="glass-btn zoom-btn" onclick="mapZoomIn()">+</button>
        <button class="glass-btn zoom-btn" onclick="mapZoomOut()">−</button>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>

</html>
